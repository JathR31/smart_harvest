name: Docker Build Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        docker build -t smartharvest:test .
    
    - name: Test Docker image
      run: |
        docker run -d \
          --name smartharvest-test \
          -p 8080:80 \
          -e APP_KEY=base64:test_key_for_ci_only \
          -e DB_CONNECTION=sqlite \
          -e DB_DATABASE=/var/www/html/database/database.sqlite \
          smartharvest:test
        
        # Wait for container to start
        sleep 10
        
        # Check if container is running
        docker ps | grep smartharvest-test
        
        # Check if services are running
        docker exec smartharvest-test supervisorctl status
        
        # Stop container
        docker stop smartharvest-test
    
    - name: Cleanup
      if: always()
      run: |
        docker rm -f smartharvest-test || true
